<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Lección 19 - Celdas</title>

    <style>

        /* Agrega bordes a la tabla */
        table, td {
            border: 1px solid black;
        }

    </style>

</head>

<body>

    <h2>Celdas de una Tabla</h2>

    <p>Las etiquetas td representan las celdas.</p>

    <table style="width:100%">

        <tr>

            <!-- Cada td representa una celda -->
            <td>Emil</td>
            <td>Tobias</td>
            <td>Linus</td>

        </tr>

    </table>

</body>

</html>
