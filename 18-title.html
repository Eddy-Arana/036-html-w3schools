<!DOCTYPE html> <!-- Documento HTML5 -->
<html lang="es"> <!-- Inicio del documento HTML -->

<head> <!-- Información de la página -->

    <meta charset="UTF-8"> <!-- Permite caracteres especiales -->

    <!-- Título que aparece en la pestaña del navegador -->
    <title>Lección 18 - HTML Page Title</title>

</head> <!-- Fin del head -->

<body> <!-- Inicio del contenido -->

    <!-- Encabezado principal -->
    <h1>Lección 18 - HTML Page Title</h1>

    <!-- Explicación -->
    <p>
        El elemento &lt;title&gt; define el nombre que aparece en la pestaña del navegador.
    </p>

</body> <!-- Fin del body -->

</html> <!-- Fin del documento -->
