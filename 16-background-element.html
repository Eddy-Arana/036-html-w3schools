<!DOCTYPE html> <!-- Documento HTML5 -->
<html lang="es"> <!-- Inicio del documento -->

<head> <!-- Información de la página -->

    <meta charset="UTF-8"> <!-- Permite caracteres especiales -->

    <title>Lección 16 - Fondo en un elemento</title>

    <style>

        /* Agrega una imagen de fondo al párrafo */

        p {
            background-image: url('img_girl.jpg'); /* Imagen de fondo */
        }

    </style>

</head>

<body>

    <h1>Lección 16 - Background Image</h1>

    <p>

        Este párrafo tiene una imagen de fondo.<br>
        La imagen se repite automáticamente si es más pequeña que el elemento.<br>
        Puedes aplicar una imagen de fondo a cualquier elemento HTML.

    </p>

</body>

</html>
