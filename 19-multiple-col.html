<!DOCTYPE html> <!-- Documento HTML5 -->
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Lección 19 - Multiple Col</title>

<style>

table, th, td{
border:1px solid black;
border-collapse:collapse;
}

th,td{
padding:10px;
text-align:center;
}

</style>

</head>

<body>

<h2>Varios grupos de columnas</h2>

<table style="width:100%">

<colgroup>

<!-- Primer grupo -->

<col span="2" style="background-color:#D6EEEE">

<!-- Segundo grupo -->

<col span="3" style="background-color:pink">

</colgroup>

<tr>
<th>Lun</th>
<th>Mar</th>
<th>Mié</th>
<th>Jue</th>
<th>Vie</th>
</tr>

<tr>
<td>1</td>
<td>2</td>
<td>3</td>
<td>4</td>
<td>5</td>
</tr>

<tr>
<td>6</td>
<td>7</td>
<td>8</td>
<td>9</td>
<td>10</td>
</tr>

</table>

</body>

</html>
