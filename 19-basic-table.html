<!DOCTYPE html> <!-- Indica que el documento utiliza HTML5 -->
<html lang="es"> <!-- Inicio del documento HTML -->

<head> <!-- Información de la página -->

    <meta charset="UTF-8"> <!-- Permite caracteres especiales -->

    <title>Lección 19 - Tabla Básica</title> <!-- Título de la pestaña -->

    <style>

        /* Aplica un borde a la tabla, encabezados y celdas */
        table, th, td {
            border: 1px solid black;
        }

    </style>

</head>

<body> <!-- Contenido visible -->

    <h2>Tabla HTML Básica</h2>

    <p>Ejemplo de una tabla sencilla.</p>

    <!-- Inicio de la tabla -->
    <table style="width:100%">

        <!-- Primera fila -->
        <tr>

            <!-- Encabezados -->
            <th>Empresa</th>
            <th>Contacto</th>
            <th>País</th>

        </tr>

        <!-- Segunda fila -->
        <tr>

            <td>Alfreds Futterkiste</td>
            <td>Maria Anders</td>
            <td>Alemania</td>

        </tr>

        <!-- Tercera fila -->
        <tr>

            <td>Centro Comercial Moctezuma</td>
            <td>Francisco Chang</td>
            <td>México</td>

        </tr>

    </table>

</body>

</html>
