<!DOCTYPE html> <!-- Indica que el documento utiliza HTML5 -->
<html lang="es"> <!-- Define el idioma de la página como español -->

<head> <!-- Contiene información de la página -->
    <title>Lección 06 - Attributes</title> <!-- Título de la página -->
</head> <!-- Fin de la sección head -->

<body> <!-- Inicio del contenido visible -->

    <h1 title="Lección sobre atributos HTML">
        Lección 06 - Attributes
    </h1> <!-- El atributo title muestra un texto al pasar el mouse -->

    <p style="color:blue;">
        Este párrafo utiliza el atributo style para cambiar el color del texto.
    </p> <!-- Usa el atributo style -->

    <h2>Ejemplo de enlace</h2>

    <a href="https://www.w3schools.com" target="_blank">
        Visitar W3Schools
    </a> <!-- Usa el atributo href -->

    <h2>Ejemplo de imagen</h2>

    <img src="w3schools.jpg"
         alt="Logo de W3Schools"
         width="104"
         height="142">
    <!-- Usa los atributos src, alt, width y height -->

</body> <!-- Fin del contenido visible -->

</html> <!-- Fin del documento HTML -->
