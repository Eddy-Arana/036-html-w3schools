<!DOCTYPE html> <!-- Documento HTML5 -->
<html lang="es"> <!-- Idioma español -->

<head>

    <meta charset="UTF-8"> <!-- Permite caracteres especiales -->

    <title>Lección 19 - Ancho de la tabla</title>

    <style>

        /* Bordes de la tabla */

        table, th, td{

            border:1px solid black;

            border-collapse:collapse;

        }

    </style>

</head>

<body>

    <!-- Título -->

    <h2>Tabla con ancho del 100%</h2>

    <!-- La tabla ocupa todo el ancho disponible -->

    <table style="width:100%">

        <tr>

            <th>Nombre</th>
            <th>Apellido</th>
            <th>Edad</th>

        </tr>

        <tr>

            <td>Juan</td>
            <td>Pérez</td>
            <td>24</td>

        </tr>

        <tr>

            <td>María</td>
            <td>Gómez</td>
            <td>31</td>

        </tr>

    </table>

</body>

</html>
