<!DOCTYPE html> <!-- Indica que el documento utiliza HTML5 -->
<html lang="es"> <!-- Inicio del documento HTML -->

<head> <!-- Contiene información de la página -->
    <title>Lección 09 - Styles</title> <!-- Título de la página -->
</head>  <!-- Fin de la sección head -->

<body style="background-color:lightskyblue;">

    <h1>Lección 09 - Styles</h1> <!-- Encabezado principal -->

    <h2 style="background-color: lightgreen;">Color de fondo</h2>
    <!-- Cambia el color de fondo del encabezado -->

    <p style="background-color: lightyellow;">
        Este parrafo tiene color de fondo
    </p>

    <hr> <!-- Línea horizontal -->

    <h2 style="color: blue;">Color del texto</h2>
    <!-- Cambia el color del texto -->

    <p style="color: red;">
        Este texto esta escrito en color rojo
    </p>

    <hr> <!-- Línea horizontal -->

    <h2 style="font-family: verdana;">Tipo de letra</h2>
    <!-- Cambia la fuente del encabezado -->

    <p style="font-family: courier;">
        Este parrafo utiliza la fuente corier
    </p>

    <hr> <!-- Línea horizontal -->

    <h2 style="font-size: 40px;">Tamaño del texto</h2>
    <!-- Cambia el tamaño del texto -->

    <p style="font-size: 20px;">
        Este parrafo tiene un tamaño de letra mayor
    </p>

    <hr> <!-- Línea horizontal -->

    <h2 style="text-align: center;">Texto centrado</h2>

    <p style="text-align: center;">
        Este parrafo esta alineado al centro
    </p>

</body> <!-- Fin del contenido visible -->

</html> <!-- Fin del documento HTML -->
