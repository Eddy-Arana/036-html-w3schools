<!DOCTYPE html> <!-- Documento HTML5 -->
<html lang="es"> <!-- Inicio del documento -->

<head>

    <meta charset="UTF-8">

    <title>Lección 16 - Imagen Flotante</title>

</head>

<body>

    <h1>Lección 16 - Imagen Flotante</h1>

    <h2>Imagen alineada a la derecha</h2>

    <p>

        <!-- Imagen flotando a la derecha -->

        <img src="smiley.gif"
             alt="Smiley"
             style="float:right;width:42px;height:42px;">

        Este texto rodea la imagen porque la propiedad float la coloca al lado derecho del párrafo.

    </p>

    <hr>

    <h2>Imagen alineada a la izquierda</h2>

    <p>

        <!-- Imagen flotando a la izquierda -->

        <img src="smiley.gif"
             alt="Smiley"
             style="float:left;width:42px;height:42px;">

        Este texto rodea la imagen porque la propiedad float la coloca al lado izquierdo del párrafo.

    </p>

</body>

</html>
