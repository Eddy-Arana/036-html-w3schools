<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Lección 19 - Rounded Borders</title>

    <style>

        /* Bordes redondeados */

        th, td{

            border:2px solid black;

            border-radius:10px;

            padding:10px;

        }

    </style>

</head>

<body>

    <h2>Bordes Redondeados</h2>

    <table style="width:100%">

        <tr>
            <th>Nombre</th>
            <th>Apellido</th>
            <th>Edad</th>
        </tr>

        <tr>
            <td>Juan</td>
            <td>Pérez</td>
            <td>24</td>
        </tr>

        <tr>
            <td>María</td>
            <td>Gómez</td>
            <td>31</td>
        </tr>

    </table>

</body>

</html>
