<!DOCTYPE html> <!-- Documento HTML5 -->
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Lección 19 - Horizontal Dividers</title>

<style>

table{
border-collapse:collapse;
width:100%;
}

/* Agrega una línea inferior a cada fila */

tr{
border-bottom:1px solid #DDD;
}

th,td{
padding:8px;
text-align:left;
}

</style>

</head>

<body>

<h2>Divisores Horizontales</h2>

<table>

<tr>
<th>Nombre</th>
<th>Apellido</th>
</tr>

<tr>
<td>Pedro</td>
<td>García</td>
</tr>

<tr>
<td>María</td>
<td>López</td>
</tr>

<tr>
<td>Carlos</td>
<td>Pérez</td>
</tr>

</table>

</body>

</html>
