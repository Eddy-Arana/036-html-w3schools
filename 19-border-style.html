<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Lección 19 - Border Style</title>

    <style>

        /* Cambia el estilo del borde */

        th, td{

            border-style:dotted;

        }

    </style>

</head>

<body>

    <h2>Border Style</h2>

    <table style="width:100%">

        <tr>
            <th>Nombre</th>
            <th>Apellido</th>
            <th>Edad</th>
        </tr>

        <tr>
            <td>Juan</td>
            <td>Pérez</td>
            <td>24</td>
        </tr>

        <tr>
            <td>María</td>
            <td>Gómez</td>
            <td>31</td>
        </tr>

    </table>

</body>

</html>
