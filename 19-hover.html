<!DOCTYPE html> <!-- Documento HTML5 -->
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Lección 19 - Hover</title>

<style>

table{
border-collapse:collapse;
width:100%;
}

th,td{
padding:8px;
text-align:left;
border-bottom:1px solid #DDD;
}

/* Cambia el color cuando el mouse pasa sobre una fila */

tr:hover{
background-color:#D6EEEE;
}

</style>

</head>

<body>

<h2>Hover en la Tabla</h2>

<p>Pasa el mouse sobre una fila.</p>

<table>

<tr>
<th>Nombre</th>
<th>Apellido</th>
<th>Puntos</th>
</tr>

<tr>
<td>Pedro</td>
<td>García</td>
<td>100</td>
</tr>

<tr>
<td>María</td>
<td>López</td>
<td>150</td>
</tr>

<tr>
<td>Carlos</td>
<td>Pérez</td>
<td>300</td>
</tr>

</table>

</body>

</html>
