<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Lección 19 - Border Collapse</title>

    <style>

        /* Agrega bordes */

        table, th, td{
            border:1px solid black;

            /* Une todos los bordes en uno solo */

            border-collapse:collapse;
        }

    </style>

</head>

<body>

    <h2>Border Collapse</h2>

    <table style="width:100%">

        <tr>
            <th>Nombre</th>
            <th>Apellido</th>
            <th>Edad</th>
        </tr>

        <tr>
            <td>Juan</td>
            <td>Pérez</td>
            <td>24</td>
        </tr>

        <tr>
            <td>María</td>
            <td>Gómez</td>
            <td>31</td>
        </tr>

    </table>

</body>

</html>
