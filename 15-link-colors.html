<!DOCTYPE html> <!-- Documento HTML5 -->
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Lección 15 - Colores de Enlaces</title>

    <!-- Estilos CSS -->
    <style>

        /* Enlace sin visitar */
        a:link{
            color:green;
            text-decoration:none;
        }

        /* Enlace ya visitado */
        a:visited{
            color:purple;
        }

        /* Cuando el cursor pasa sobre el enlace */
        a:hover{
            color:red;
            text-decoration:underline;
        }

        /* Mientras se hace clic */
        a:active{
            color:orange;
        }

    </style>

</head>

<body>

    <h1>Lección 15 - Colores de Enlaces</h1>

    <p>
        Mueve el cursor sobre el enlace y luego haz clic para observar los cambios.
    </p>

    <!-- Enlace para probar los diferentes estados -->

    <a href="https://www.w3schools.com" target="_blank">

        Visitar W3Schools

    </a>

</body>

</html>
