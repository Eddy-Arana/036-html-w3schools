<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Lección 19 - Filas</title>

    <style>

        /* Agrega bordes */
        table, td {
            border: 1px solid black;
        }

    </style>

</head>

<body>

    <h2>Filas de una Tabla</h2>

    <p>Cada etiqueta tr crea una fila.</p>

    <table style="width:100%">

        <!-- Primera fila -->
        <tr>

            <td>Emil</td>
            <td>Tobias</td>
            <td>Linus</td>

        </tr>

        <!-- Segunda fila -->
        <tr>

            <td>16</td>
            <td>14</td>
            <td>10</td>

        </tr>

    </table>

</body>

</html>
