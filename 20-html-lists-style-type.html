<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Lección 20 - Estilos de Listas</title>
</head>

<body>

    <!-- ================================================ -->
    <!-- LISTA CON VIÑETAS TIPO DISC (Predeterminado) -->
    <!-- ================================================ -->

    <h2>Lista con viñetas Disc</h2>

    <ul style="list-style-type: disc;">
        <li>Café</li>
        <li>Té</li>
        <li>Leche</li>
    </ul>

    <hr>

    <!-- ================================================ -->
    <!-- LISTA CON VIÑETAS TIPO CIRCLE -->
    <!-- Muestra círculos vacíos -->
    <!-- ================================================ -->

    <h2>Lista con viñetas Circle</h2>

    <ul style="list-style-type: circle;">
        <li>Café</li>
        <li>Té</li>
        <li>Leche</li>
    </ul>

    <hr>

    <!-- ================================================ -->
    <!-- LISTA CON VIÑETAS TIPO SQUARE -->
    <!-- Muestra cuadrados -->
    <!-- ================================================ -->

    <h2>Lista con viñetas Square</h2>

    <ul style="list-style-type: square;">
        <li>Café</li>
        <li>Té</li>
        <li>Leche</li>
    </ul>

    <hr>

    <!-- ================================================ -->
    <!-- LISTA SIN VIÑETAS -->
    <!-- list-style-type:none elimina los marcadores -->
    <!-- ================================================ -->

    <h2>Lista sin viñetas</h2>

    <ul style="list-style-type: none;">
        <li>Café</li>
        <li>Té</li>
        <li>Leche</li>
    </ul>

</body>

</html>
