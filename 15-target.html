<!DOCTYPE html> <!-- Documento HTML5 -->
<html lang="es"> <!-- Inicio del documento -->

<head> <!-- Información de la página -->

    <meta charset="UTF-8"> <!-- Codificación UTF-8 -->

    <title>Lección 15 - Target</title> <!-- Título -->

</head> <!-- Fin del head -->

<body> <!-- Inicio del contenido -->

    <h1>Lección 15 - Atributo target</h1> <!-- Encabezado -->

    <p>
        El atributo <strong>target</strong> indica dónde abrir el enlace.
    </p>

    <!-- Enlace que abre en la misma pestaña -->
    <h2>target="_self"</h2>

    <a href="https://www.google.com" target="_self">
        Abrir Google en esta pestaña
    </a>

    <hr> <!-- Línea divisoria -->

    <!-- Enlace que abre en otra pestaña -->
    <h2>target="_blank"</h2>

    <a href="https://www.google.com" target="_blank">
        Abrir Google en una nueva pestaña
    </a>

</body> <!-- Fin del contenido -->

</html> <!-- Fin del documento -->
