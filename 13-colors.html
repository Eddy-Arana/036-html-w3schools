<!DOCTYPE html> <!-- Indica que el documento utiliza HTML5 -->
<html lang="es"> <!-- Inicio del documento HTML e idioma en español -->

<head> <!-- Contiene información de la página -->
    <title>Lección 13 - Colors</title> <!-- Título que aparece en la pestaña del navegador -->
</head> <!-- Fin de la sección head -->

<body> <!-- Inicio del contenido visible de la página -->

    <h1>Lección 13 - Nombres de colores</h1> <!-- Encabezado principal -->

    <p>
        HTML permite utilizar nombres de colores predefinidos.
    </p> <!-- Párrafo de explicación -->

    <h2 style="background-color: tomato;">Tomato</h2>
    <!-- Fondo con el nombre de color Tomato -->

    <h2 style="background-color: orange;">Orange</h2>
    <!-- Fondo con el nombre de color Orange -->

    <h2 style="background-color: mediumseagreen;">MediumSeaGreen</h2>
    <!-- Fondo con el nombre de color MediumSeaGreen -->

    <h2 style="background-color: slateblue;">SlateBlue</h2>
    <!-- Fondo con el nombre de color SlateBlue -->

    <h2 style="background-color: dodgerblue;">DodgerBlue</h2>
    <!-- Fondo con el nombre de color DodgerBlue -->

    <h2 style="background-color: violet;">Violet</h2>
    <!-- Fondo con el nombre de color Violet -->

    <hr> <!-- Inserta una línea horizontal para separar contenido -->

    <h2 style="background-color: lightgray;">
        Ejemplo de color de fondo
    </h2>
    <!-- Encabezado con fondo gris claro -->

    <p style="background-color: tomato;">
        Este párrafo tiene un fondo color Tomato.
    </p>
    <!-- Párrafo con color de fondo Tomato -->

    <p style="border: 2px solid dodgerblue;">
        Este párrafo tiene un borde azul.
    </p>
    <!-- Párrafo con un borde azul de 2 píxeles -->

</body> <!-- Fin del contenido visible -->

</html> <!-- Fin del documento HTML -->
