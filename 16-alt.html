    <p>
        El atributo alt debería reflejar el contenido de la imagen, para que los usuarios que no pueden ver la imagen entiendan lo que contiene img src="img_chania.jpg"
         alt="Flowers in Chania".
    </p>

    <!-- Imagen inexistente para demostrar el atributo alt -->
