<!DOCTYPE html> <!-- Documento HTML5 -->
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Lección 15 - Botón con Enlace</title>

    <!-- Estilos CSS -->
    <style>

        /* Convierte el enlace en un botón */

        a{

            background-color:steelblue;
            color:white;
            padding:15px 25px;
            text-decoration:none;
            display:inline-block;

        }

        /* Cambia el color cuando el cursor pasa sobre el botón */

        a:hover{

            background-color:royalblue;

        }

    </style>

</head>

<body>

    <h1>Lección 15 - Enlace como Botón</h1>

    <p>
        Mediante CSS un enlace puede tener apariencia de botón.
    </p>

    <!-- Botón que dirige a otra página -->

    <a href="https://www.w3schools.com" target="_blank">

        Abrir W3Schools

    </a>

</body>

</html>
