<!DOCTYPE html> <!-- Documento HTML5 -->
<html lang="es"> <!-- Inicio del documento -->

<head>

    <meta charset="UTF-8"> <!-- Permite caracteres especiales -->

    <title>Lección 19 - Bordes</title>

    <style>

        /* Agrega un borde negro a la tabla y a todas sus celdas */

        table, th, td{
            border:1px solid black;
        }

    </style>

</head>

<body>

    <!-- Título principal -->

    <h2>Tabla con Bordes</h2>

    <!-- Tabla -->

    <table style="width:100%">

        <tr>
            <th>Nombre</th>
            <th>Apellido</th>
            <th>Edad</th>
        </tr>

        <tr>
            <td>Juan</td>
            <td>Pérez</td>
            <td>24</td>
        </tr>

        <tr>
            <td>María</td>
            <td>Gómez</td>
            <td>31</td>
        </tr>

    </table>

</body>

</html>
