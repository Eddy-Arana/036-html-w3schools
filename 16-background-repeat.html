<!DOCTYPE html> <!-- Documento HTML5 -->
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Lección 16 - Background Repeat</title>

    <style>

        /* Imagen sin repetición */

        body {

            background-image: url('img_girl.jpg');
            background-repeat: no-repeat;

        }

    </style>

</head>

<body>

    <h1>Lección 16 - Background Repeat</h1>

    <p>

        La propiedad background-repeat evita que la imagen se repita.

    </p>
