<!DOCTYPE html> <!-- Indica que el documento utiliza HTML5 -->
<html lang="es"> <!-- Inicio del documento HTML -->
    <head> <!-- Contiene información de la página -->
        <title>Lección 13 - HEX Colors</title> <!-- Título de la página -->
    </head> <!-- Fin del head -->

<body><!-- Inicio del contenido -->

    <h1>Lección 13 - Colores HEX</h1> <!-- Encabezado principal -->

    <p>
        Los colores HEX utilizan numeros y letras para representar un color
    </p> <!-- Explicación -->

    <h2 style="background-color: #ff0000;">
        #ff0000 - Rojo
    </h2> <!-- Color rojo -->

    <h2 style="background-color: #00ff00;">
        #00ff00 - Verde
    </h2> <!-- Color verde -->

    <h2 style="background-color: #0000ff;">
        #0000ff - Azul
    </h2> <!-- Color azul -->

    <hr> <!-- Línea horizontal -->

    <h2>Tonos de gris</h2> <!-- Encabezado -->

    <p style="background-color: #404040;">
        #404040 - Gris oscuro
    </p> <!-- Gris oscuro -->

    <p style="background-color: #808080;">
        #808080 - Gris medio
    </p> <!-- Gris medio -->

    <p style="background-color: #dcdcdc;">
        #dcdcdc - Gris claro
    </p> <!-- Gris claro -->

    <hr> <!-- Línea horizontal -->

    <p style="border: 2px solid #6a5acd;">
        Este parrafo tiene un borde usando un color Hex
    </p>  <!-- Ejemplo de borde -->

</body> <!-- Fin del contenido -->

</html> <!-- Fin del documento HTML -->
