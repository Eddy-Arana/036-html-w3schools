<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Lección 19 - Caption</title>

    <style>

        table, th, td{

            border:1px solid black;

            border-collapse:collapse;

        }

        th, td{

            padding:8px;

            text-align:left;

        }

    </style>

</head>

<body>

    <h2>Caption</h2>

    <!-- Tabla -->

    <table style="width:100%">

        <!-- Título de la tabla -->

        <caption>Ventas Mensuales</caption>

        <tr>

            <th>Mes</th>

            <th>Ventas</th>

        </tr>

        <tr>

            <td>Enero</td>

            <td>Q10,000</td>

        </tr>

        <tr>

            <td>Febrero</td>

            <td>Q12,500</td>

        </tr>

    </table>

</body>

</html>
