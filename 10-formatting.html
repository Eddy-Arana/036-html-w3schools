<!DOCTYPE html> <!-- Indica que el documento utiliza HTML5 -->
<html lang="es"> <!-- Inicio del documento HTML -->
    <head>
        <title> Lección 10 - Formatting</title> <!-- Título de la página -->
    </head> <!-- Fin de la sección head -->

    <body> <!-- Inicio del contenido visible -->

        <h1>Lección 10 - Formatting</h1> <!-- Encabezado principal -->

        <p>Este es un texto <b>en negrita</b></p>
         <!-- La etiqueta b muestra el texto en negrita -->

        <p>Estes es un texto <strong>importante</strong></p>
         <!-- La etiqueta strong indica que el texto es importante -->

        <p>Este es un texto <i>en cursiva</i></p>
            <!-- La etiqueta i muestra el texto en cursiva -->

        <p>Este es un texto en <em>con enfasis</em></p>
         <!-- La etiqueta em da énfasis al texto -->

        <p>Este es un texto <mark>resaltado</mark></p>
         <!-- La etiqueta mark resalta el texto -->

        <p>Este es un texto <small>más pequeño</small></p>
         <!-- La etiqueta small reduce el tamaño del texto -->

        <p>Precio anterior: <del>Q250</del></p>
        <!-- La etiqueta del muestra texto eliminado -->

        <p>Precio actual: <ins>Q200</ins></p>
        <!-- La etiqueta ins muestra texto insertado o subrayado -->

        <p>La formula del agua es H<sub>2</sub>0.</p>
        <!-- La etiqueta sub coloca el texto debajo de la línea -->
         
        <p>2<sup>3</sup> = 8.</p>
         <!-- La etiqueta sup coloca el texto arriba de la línea -->

    </body> <!-- Fin del contenido visible -->
</html> <!-- Fin del documento HTML -->
