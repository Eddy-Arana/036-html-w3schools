<!DOCTYPE html> <!-- Documento HTML5 -->
<html lang="es"> <!-- Inicio del documento HTML -->

<head> <!-- Información de la página -->

    <meta charset="UTF-8"> <!-- Permite caracteres especiales -->

    <!-- Título descriptivo para mejorar la identificación de la página -->
    <title>Curso de HTML - Lección 18 | Títulos de Página</title>

</head> <!-- Fin del head -->

<body> <!-- Inicio del contenido -->

    <!-- Encabezado principal -->
    <h1>Lección 18 - Buen título de página</h1>

    <!-- Explicación -->
    <p>
        Un buen título debe describir claramente el contenido de la página.
    </p>

    <p>
        El título también ayuda a los motores de búsqueda (SEO), aparece en los marcadores del navegador y en la pestaña de la página.
    </p>

</body> <!-- Fin del body -->

</html> <!-- Fin del documento -->
