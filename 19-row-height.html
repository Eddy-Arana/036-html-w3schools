<!DOCTYPE html> <!-- Documento HTML5 -->
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Lección 19 - Alto de fila</title>

    <style>

        /* Bordes */

        table, th, td{

            border:1px solid black;

            border-collapse:collapse;

        }

    </style>

</head>

<body>

    <!-- Título -->

    <h2>Altura de una fila</h2>

    <table style="width:100%">

        <tr>

            <th>Nombre</th>

            <th>Apellido</th>

            <th>Edad</th>

        </tr>

        <!-- Esta fila tendrá una altura de 200 píxeles -->

        <tr style="height:200px">

            <td>Juan</td>

            <td>Pérez</td>

            <td>24</td>

        </tr>

        <tr>

            <td>María</td>

            <td>Gómez</td>

            <td>31</td>

        </tr>

    </table>

</body>

</html>
