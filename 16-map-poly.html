<!DOCTYPE html> <!-- Documento HTML5 -->
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Lección 16 - Image Map Polígono</title>

</head>

<body>

    <h1>Lección 16 - Área Poligonal</h1>

    <p>
        Haz clic sobre el croissant.
    </p>

    <!-- Imagen -->
    <img src="frenchfood.jpg"
         alt="French Food"
         usemap="#foodmap"
         width="450"
         height="675">

    <!-- Mapa -->
    <map name="foodmap">

        <!-- Área con forma de polígono -->
        <area shape="poly"
              coords="140,121,181,116,204,160,204,222,191,270,140,329,85,355,58,352,37,322,40,259,103,161,128,147"
              alt="Croissant"
              href="https://es.wikipedia.org/wiki/Croissant"
              target="_blank">

    </map>

</body>

</html>
