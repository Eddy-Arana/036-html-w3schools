<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Lección 20 - Listas Básicas</title>
</head>

<body>

    <!-- ================================================= -->
    <!-- LISTA DESORDENADA (UL) -->
    <!-- Los elementos aparecen con viñetas -->
    <!-- ================================================= -->

    <h2>Lista Desordenada</h2>

    <ul>
        <li>Café</li>
        <li>Té</li>
        <li>Leche</li>
    </ul>

    <hr>

    <!-- ================================================= -->
    <!-- LISTA ORDENADA (OL) -->
    <!-- Los elementos aparecen numerados -->
    <!-- ================================================= -->

    <h2>Lista Ordenada</h2>

    <ol>
        <li>Café</li>
        <li>Té</li>
        <li>Leche</li>
    </ol>

    <hr>

    <!-- ================================================= -->
    <!-- LISTA DE DESCRIPCIÓN (DL) -->
    <!-- Se utiliza para definir términos y su descripción -->
    <!-- ================================================= -->

    <h2>Lista de Descripción</h2>

    <dl>

        <!-- Término -->
        <dt>Café</dt>

        <!-- Descripción -->
        <dd>Bebida caliente de color negro.</dd>

        <!-- Segundo término -->
        <dt>Leche</dt>

        <!-- Descripción -->
        <dd>Bebida fría de color blanco.</dd>

    </dl>

</body>

</html>
