<!DOCTYPE html> <!-- Documento HTML5 -->
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Lección 19 - Ancho de columna</title>

    <style>

        /* Bordes */

        table, th, td{

            border:1px solid black;

            border-collapse:collapse;

        }

    </style>

</head>

<body>

    <!-- Título -->

    <h2>Ancho de una columna</h2>

    <table style="width:100%">

        <tr>

            <!-- Esta columna ocupará el 70% -->

            <th style="width:70%">Nombre</th>

            <th>Apellido</th>

            <th>Edad</th>

        </tr>

        <tr>

            <td>Juan</td>

            <td>Pérez</td>

            <td>24</td>

        </tr>

        <tr>

            <td>María</td>

            <td>Gómez</td>

            <td>31</td>

        </tr>

    </table>

</body>

</html>
