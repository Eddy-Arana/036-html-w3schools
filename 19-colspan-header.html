<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Lección 19 - Colspan</title>

    <style>

        table, th, td{

            border:1px solid black;

            border-collapse:collapse;

        }

    </style>

</head>

<body>

    <h2>Encabezado con Colspan</h2>

    <table style="width:100%">

        <tr>

            <!-- Este encabezado ocupa dos columnas -->

            <th colspan="2">Nombre Completo</th>

            <th>Edad</th>

        </tr>

        <tr>

            <td>Juan</td>

            <td>Pérez</td>

            <td>24</td>

        </tr>

        <tr>

            <td>María</td>

            <td>Gómez</td>

            <td>31</td>

        </tr>

    </table>

</body>

</html>
