<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Lección 19 - Encabezados</title>

    <style>

        /* Bordes para la tabla */
        table, th, td {
            border: 1px solid black;
        }

    </style>

</head>

<body>

    <h2>Encabezados de Tabla</h2>

    <p>La etiqueta th crea encabezados.</p>

    <table style="width:100%">

        <!-- Fila de encabezados -->
        <tr>

            <th>Persona 1</th>
            <th>Persona 2</th>
            <th>Persona 3</th>

        </tr>

        <!-- Primera fila de datos -->
        <tr>

            <td>Emil</td>
            <td>Tobias</td>
            <td>Linus</td>

        </tr>

        <!-- Segunda fila de datos -->
        <tr>

            <td>16</td>
            <td>14</td>
            <td>10</td>

        </tr>

    </table>

</body>

</html>
