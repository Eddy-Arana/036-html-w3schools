<!DOCTYPE html> <!-- Documento HTML5 -->
<html lang="es">

<head>

    <meta charset="UTF-8"> <!-- Permite caracteres especiales -->

    <title>Lección 19 - Encabezados</title>

    <style>

        /* Agrega bordes a la tabla */

        table, th, td{

            border:1px solid black;

            border-collapse:collapse;

        }

    </style>

</head>

<body>

    <!-- Título -->

    <h2>Encabezados de Tabla</h2>

    <!-- Tabla -->

    <table style="width:100%">

        <tr>

            <!-- Encabezados -->

            <th>Nombre</th>

            <th>Apellido</th>

            <th>Edad</th>

        </tr>

        <tr>

            <td>Juan</td>

            <td>Pérez</td>

            <td>24</td>

        </tr>

        <tr>

            <td>María</td>

            <td>Gómez</td>

            <td>31</td>

        </tr>

    </table>

</body>

</html>
